<!DOCTYPE>
<html>
    <head> 
        <title> My superhero card</title>
        <style>
             
            body{
                background-color: darkblue;
                color: white;
                font-family:Arial, sans-serif;
            }

            .hero-name{
                font-size: 48px;
                font-weight: bold;
                text-shadow: 2px 2px orange;
            }
             
            .tagline{
                font-style: itallic;
                color: lightblue;
                text-transform: capitalize;
            }

            .label{
                text-transform: uppercase;
                text-decoration: underline;
                color:coral;

            }

            .power{
                font-weight: bold;
                color:lightgreen;
            }
  
            .weakness{
                text-decoration: line-through;
                color: grey;
            }

            .badge{
                font-size: 28px;
                font-weight: bold;
                color: gold;
                transform: rotate(15deg);
            }

            .made by{
                color: coral;
                font-style: itallic;

            }

    
        </style>
        </head>
        <body>

            <h1 class="hero-name">Thunder kid</h1>
            <p class="tagline">The most powerful hero in the school</p>

            <h2 class="label">Superpowers</h2>
            <p class="power">can run faster than a cheetah</p>
            <p class="power">Can lift a school bus</p>

            <h2 class="label">Weaknesses</h2>
            <p class="weakness">Maths homework</p>
            <p class="weakness">Broccoli</p>

            <p class="badge">Top Hero</p>

            <p class="made by">Created by_____________</p>

        </body>
        </html>
